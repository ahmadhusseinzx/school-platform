<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- خلفية درع -->
  <polygon points="200,30 370,120 370,280 200,370 30,280 30,120" fill="#1a3a5c" stroke="#c9a84c" stroke-width="6"/>
  
  <!-- كتاب مفتوح -->
  <path d="M100,230 L200,170 L300,230 L300,310 L200,250 L100,310 Z" fill="#f5f5f0" stroke="#c9a84c" stroke-width="3"/>
  <line x1="200" y1="170" x2="200" y2="250" stroke="#c9a84c" stroke-width="3"/>
  
  <!-- حرف A -->
  <polygon points="115,130 155,130 135,90" fill="#c9a84c"/>
  <line x1="125" y1="115" x2="145" y2="115" stroke="#1a3a5c" stroke-width="2"/>
  
  <!-- حرف C -->
  <path d="M170,130 C190,90 220,90 235,110" fill="none" stroke="#c9a84c" stroke-width="6" stroke-linecap="round"/>
  
  <!-- حرف E -->
  <polygon points="250,90 285,90 285,110 268,110 268,115 285,115 285,130 250,130" fill="#c9a84c"/>
  
  <!-- نجمة فوق الدرع -->
  <polygon points="200,20 208,45 235,45 213,60 222,85 200,70 178,85 187,60 165,45 192,45" fill="#c9a84c"/>
  
  <!-- نص ACE -->
  <text x="200" y="370" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#c9a84c" text-anchor="middle" letter-spacing="8">ACE</text>
  
  <!-- نص Academy -->
  <text x="200" y="395" font-family="Arial, sans-serif" font-size="14" fill="#f5f5f0" text-anchor="middle" letter-spacing="4">ACADEMY</text>
</svg>